<!-- CONTACT FORM -->
<section class="contact-section">
  <form class="contact-form">
    <p class="form-note">※印は必須項目となります。</p>

    <div class="form-fields">
      <div class="form-row">
        <label class="form-label" for="f-company">会社名 <span class="required">※</span></label>
        <input class="form-input" type="text" id="f-company" name="company" placeholder="株式会社◯◯" required>
      </div>

      <div class="form-row">
        <label class="form-label" for="f-name">お名前 <span class="required">※</span></label>
        <input class="form-input" type="text" id="f-name" name="name" placeholder="山田　太郎" required>
      </div>

      <div class="form-row">
        <label class="form-label" for="f-kana">ふりがな <span class="required">※</span></label>
        <input class="form-input" type="text" id="f-kana" name="kana" placeholder="やまだ　たろう" required>
      </div>

      <div class="form-row">
        <label class="form-label" for="f-email">メールアドレス <span class="required">※</span></label>
        <input class="form-input" type="email" id="f-email" name="email" placeholder="sample@email.com" required>
      </div>

      <div class="form-row">
        <label class="form-label" for="f-dept">部署名 <span class="required">※</span></label>
        <input class="form-input" type="text" id="f-dept" name="dept" placeholder="営業部" required>
      </div>

      <div class="form-row">
        <label class="form-label" for="f-tel">電話番号 <span class="required">※</span></label>
        <input class="form-input" type="tel" id="f-tel" name="tel" placeholder="080-1234-5678" required>
      </div>

      <div class="form-row">
        <p class="form-label">お問い合わせの種類 <span class="required">※</span></p>
        <div class="form-radio-group">
          <label class="form-radio"><input type="radio" name="type" value="人材紹介、派遣のご相談" required>人材紹介、派遣のご相談</label>
          <label class="form-radio"><input type="radio" name="type" value="採用について">採用について</label>
          <label class="form-radio"><input type="radio" name="type" value="その他のご相談">その他のご相談</label>
        </div>
      </div>

      <div class="form-row">
        <label class="form-label" for="f-message">お問い合わせ内容 <span class="required">※</span></label>
        <textarea class="form-textarea" id="f-message" name="message" placeholder="お問い合わせ内容を入力してください" required></textarea>
      </div>
    </div>

    <label class="form-agree">
      <input type="checkbox" required>
      <span><a href="#">プライバシーポリシー</a>に同意して送信する</span>
    </label>

    <button class="form-submit" type="submit">この内容で送信する</button>
  </form>
</section>
